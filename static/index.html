          this.contentPack = null;
          this.refusalReason = null;
          this.runDetail = null;
          this.elapsed = '0.0';
          this.startTime = Date.now();
          this.agentStrip = defaultAgentStrip();
          this.formCollapsed = true;
          this.logCollapsed = false;

          const payload = {
            ...this.brief,
            product_focus: (this.brief.productInput || '').split(',').map(s => s.trim()).filter(Boolean),
            topic_focus: this.brief.topic_focus || null,
            format_intent: this.brief.format_intent || null,
          };
          delete payload.productInput;

          if (this.demoMode) {
            return this.runMock(payload);
          }

          try {
            const r = await fetch('http://localhost:8000/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!r.ok) throw new Error('generate failed');
            const { trace_id } = await r.json();
            this.traceId = trace_id;
            this.openStream(trace_id);
          } catch (e) {
            this.showToast('Backend error — falling back to Mock');
            this.demoMode = true; this.backendOnline = false;
            this.runMock(payload);
          }
        },

        openStream(traceId) {
          const es = new EventSource('http://localhost:8000/stream/' + traceId);
          es.onmessage = (e) => {
            try {
              const data = JSON.parse(e.data);
              this.handleEvent(data);
              if (data.event_type === 'pipeline_done') {
                es.close();
                this.isRunning = false;
                this.loadHistory();
                this.loadRunDetail(this.traceId);
              }
            } catch (err) { /* skip */ }
          };
          es.onerror = () => {
            es.close();
            this.isRunning = false;
            this.showToast('Stream interrupted');
          };
        },

        // ============================================================
        // Event handler — drives event log, agent strip, content pack
        // ============================================================
        handleEvent(data) {
          const ts = this.nowTs();
          const t = data.event_type;
          let text = '', ico = '·', color = 'var(--text-3)';

          if (t === 'pipeline_start') {
            this.traceId = data.trace_id;
            ico = '⬡'; color = 'var(--accent)';
            text = `Pipeline started — “${(data.goal||'').slice(0,80)}${(data.goal||'').length>80?'…':''}”`;
            this.currentAgent = 'researcher';
          }
          else if (t === 'researcher_start') {
            this.setAgent('research', 'running', 'searching web…');
            ico = '⟳'; color = 'var(--accent)';
            text = 'Researcher agent: gathering web context…';
            this.currentAgent = 'researcher';
          }
          else if (t === 'researcher_done') {
            this.setAgent('research', 'done', `${data.findings} findings · $${(data.cost_usd||0).toFixed(4)}`);
            ico = '✓'; color = 'var(--ok)';
            text = `Researcher: found ${data.findings} results ($${(data.cost_usd||0).toFixed(4)})`;
            this.currentAgent = 'writer';
            this.setAgent('writer_li', 'running', 'drafting…');
            this.setAgent('writer_em', 'running', 'drafting…');
          }
          else if (t === 'writer_done') {
            // optional event some backends emit
            this.setAgent('writer_' + (data.platform==='email' ? 'em' : 'li'), 'done', `$${(data.cost_usd||0).toFixed(4)}`);
            ico = '✓'; color = 'var(--ok)';
            text = `Writer (${data.platform}): draft complete`;
          }
          else if (t === 'validator_start') {
            this.setAgent('writer_' + (data.platform==='email' ? 'em' : 'li'), 'done');
            this.setAgent('validator', 'running', `${data.platform} draft`);
            ico = '⟳'; color = 'var(--accent)';
            text = `Validator: reviewing ${data.platform} draft…`;
            this.currentAgent = 'validator';
          }
          else if (t === 'validator_done') {
            this.setAgent('validator', data.ship ? 'done' : 'running', data.ship ? `${data.platform} approved` : `${data.platform} revising`);
            ico = data.ship ? '✓' : '✗'; color = data.ship ? 'var(--ok)' : 'var(--warn)';
            text = `Validator ${data.platform}: ${data.ship ? '✓ approved' : '✗ revision requested — ' + (data.revision_notes || 'see notes')}`;
          }
          else if (t === 'pipeline_finalizing') {
            ico = '⬡'; color = 'var(--accent)';
            text = `Finalizing: ${data.status}${data.reason ? ' — ' + data.reason : ''}`;
            if (data.status === 'refused') {
              this.refusalReason = data.reason || 'Editorial guardrails were triggered.';
              this.agentStrip.forEach(a => { if (a.state==='running') a.state='fail'; });
            }
          }
          else if (t === 'pipeline_warning') {
            ico = '⚠'; color = 'var(--warn)';
            text = `Warning: ${data.message}`;
          }
          else if (t === 'budget_exhausted') {
            ico = '⚠'; color = 'var(--warn)';
            text = `Budget limit reached (${data.turns_used} turns · $${(data.cost_usd||0).toFixed(4)})`;
          }
          else if (t === 'pipeline_done') {
            this.agentStrip.forEach(a => { if (a.state==='running') a.state='done'; });
            ico = '✓'; color = 'var(--ok)';
            text = `Pipeline complete · status: ${data.status} ($${(data.cost_usd||0).toFixed(4)})`;
            this.contentPack = data.content_pack;
            this.lastRunStatus = data.status;
            if (data.content_pack?.linkedin_draft) this.activeTab = 'linkedin';
            else if (data.content_pack?.email_draft) this.activeTab = 'email';
            this.currentAgent = null;
          }
          else {
            text = `${t}`;
          }

          this.events.push({ ts, ico, color, text });
          this.$nextTick(() => {
            const box = this.$refs.logBox;
            if (box) box.scrollTop = box.scrollHeight;
          });
        },

        setAgent(key, state, detail) {
          const a = this.agentStrip.find(x => x.key === key);
          if (a) {
            a.state = state;
            if (detail !== undefined) a.detail = detail;
          }
        },

        // ============================================================
        // Render body with inline citation chips
        // ============================================================
        activeDraft() {
          if (!this.contentPack) return null;
          return this.activeTab === 'linkedin' ? this.contentPack.linkedin_draft : this.contentPack.email_draft;
        },
        activeVerdict() {
          if (!this.contentPack) return null;
          return this.activeTab === 'linkedin' ? this.contentPack.linkedin_verdict : this.contentPack.email_verdict;
        },
        renderBodyWithCitations() {
          const draft = this.activeDraft();
          if (!draft) return '';
          let body = escapeHtml(draft.body || '');
          const claims = (draft.claims || []).slice().sort((a, b) => (b.cited_substring?.length || 0) - (a.cited_substring?.length || 0));
          claims.forEach((c, idx) => {
            if (!c.cited_substring) return;
            // Look for a SHORT prefix of cited_substring within the body (highlighting first claim phrase)
            const probe = escapeHtml(c.cited_substring.slice(0, 40));
            const re = new RegExp(escapeRegex(probe), 'i');
            if (re.test(body)) {
              body = body.replace(re, (m) =>
                `<span class="hl" data-claim="${idx}">${m}<sup class="chip ml-0.5" data-cid="${c.chunk_id}" data-sub="${encodeURIComponent(c.cited_substring)}" style="cursor:pointer">${escapeHtml(c.taxonomy||'?')}</sup></span>`
              );
            }
          });
          // Defer click binding via event delegation
          setTimeout(() => this.bindInlineChips(), 0);
          return body;
        },
        bindInlineChips() {
          document.querySelectorAll('sup.chip[data-cid]').forEach(el => {
            if (el.__bound) return; el.__bound = true;
            el.addEventListener('click', () => {
              this.viewChunk(el.dataset.cid, decodeURIComponent(el.dataset.sub || ''));
            });
          });
        },

        renderChunkContent() {
          if (!this.viewingChunk) return '';
          let content = escapeHtml(this.viewingChunk.content || '');
          const sub = this.viewingChunk.cited_substring;
          if (sub) {
            const re = new RegExp(escapeRegex(escapeHtml(sub)), 'i');
            content = content.replace(re, m => `<span class="hl">${m}</span>`);
          }
          return content;
        },

        // ============================================================
        // Chunk viewer
        // ============================================================
        async viewChunk(chunk_id, cited_substring) {
          this.chunkError = null;
          this.viewingChunk = null;
          if (this.demoMode) {
            const chunk = mockChunk(chunk_id, cited_substring);
            if (chunk) this.viewingChunk = chunk;
            else this.chunkError = `Chunk ${chunk_id} not found.`;
            return;
          }
          try {
            const r = await fetch('http://localhost:8000/corpus/chunk/' + encodeURIComponent(chunk_id));
            if (!r.ok) throw new Error('not found');
            const data = await r.json();
            data.cited_substring = cited_substring;
            this.viewingChunk = data;
          } catch (e) {
            this.chunkError = `Chunk ${chunk_id} not found.`;
          }
        },

        // ============================================================
        // Run history load
        // ============================================================
        async loadRun(trace_id) {
          this.events = [{ ts: this.nowTs(), ico: '↺', color: 'var(--text-3)', text: 'Loaded from history · ' + trace_id.slice(0,8) }];
          this.traceId = trace_id;
          this.contentPack = null;
          this.refusalReason = null;
          this.runDetail = null;
          this.openToolEvents = [];
          this.isRunning = false;
          this.agentStrip = defaultAgentStrip().map(a => ({ ...a, state: 'done' }));

          if (this.demoMode) {
            const pack = mockResults[trace_id] || generateMockPack(this.runs.find(r => r.trace_id === trace_id));
            if (pack) this.contentPack = pack;
            this.activeTab = pack?.linkedin_draft ? 'linkedin' : 'email';
            if (pack?.status === 'refused') this.refusalReason = 'Editorial guardrails triggered: claim of curative effect on chronic disease and instruction to discontinue medication.';
            return;
          }

          try {
            const r = await fetch('http://localhost:8000/result/' + trace_id);
            if (r.status === 202) { this.showToast('Run still in progress'); return; }
            if (!r.ok) throw new Error('not found');
            this.contentPack = await r.json();
            if (this.contentPack?.linkedin_draft) this.activeTab = 'linkedin';
            else if (this.contentPack?.email_draft) this.activeTab = 'email';
            if (this.contentPack?.status === 'refused') this.refusalReason = this.contentPack.finalize_reason || 'Editorial guardrails were triggered.';
          } catch (e) {
            this.showToast('Could not load run');
          }
          // Fetch agent trace detail in parallel (non-blocking)
          this.loadRunDetail(trace_id);
        },

        async loadRunDetail(trace_id) {
          if (this.demoMode) return;
          try {
            const r = await fetch('http://localhost:8000/runs/' + trace_id + '/detail');
            if (r.ok) {
              this.runDetail = await r.json();
              this.traceDetailOpen = true;
              this.openToolEvents = [];
            }
          } catch (e) { /* swallow — trace detail is non-critical */ }
        },

        async triggerReplay(trace_id) {
          if (!trace_id || this.isReplaying || this.isRunning) return;
          this.isReplaying = true;
          try {
            const r = await fetch('http://localhost:8000/runs/' + trace_id + '/replay');
            if (!r.ok) throw new Error('replay failed');
            const { trace_id: newId } = await r.json();
            this.isReplaying = false;
            // Transition to live stream view for the new run
            this.runDetail = null;
            this.contentPack = null;
            this.refusalReason = null;
            this.events = [];
            this.agentStrip = defaultAgentStrip();
            this.isRunning = true;
            this.startTime = Date.now();
            this.elapsed = '0.0';
            this.traceId = newId;
            this.formCollapsed = true;
            this.logCollapsed = false;
            this.openStream(newId);
          } catch (e) {
            this.isReplaying = false;
            this.showToast('Replay failed — check server logs');
          }
        },

        toggleToolEvent(idx) {
          const pos = this.openToolEvents.indexOf(idx);
          if (pos >= 0) this.openToolEvents.splice(pos, 1);
          else this.openToolEvents.push(idx);
          this.openToolEvents = [...this.openToolEvents];
        },
        toolEventOpen(idx) { return this.openToolEvents.includes(idx); },
        formatJson(s) {
          try { return JSON.stringify(JSON.parse(s), null, 2); }
          catch { return s || ''; }
        },

        toggleCompare(trace_id) {
          const idx = this.compareIds.indexOf(trace_id);
          if (idx >= 0) {
            this.compareIds.splice(idx, 1);
            this.compareData[idx] = null;
            this.compareData = [...this.compareData];
          } else if (this.compareIds.length < 2) {
            this.compareIds.push(trace_id);
            this.loadCompareSlot(this.compareIds.length - 1, trace_id);
          } else {
            // replace slot 0
            this.compareIds[0] = trace_id;
            this.compareData[0] = null;
            this.loadCompareSlot(0, trace_id);
          }
        },
        async loadCompareSlot(slot, trace_id) {
          let pack = null;
          if (this.demoMode) {
            pack = mockResults[trace_id] || generateMockPack(this.runs.find(r => r.trace_id === trace_id));
          } else {
            try { const r = await fetch('http://localhost:8000/result/' + trace_id); if (r.ok) pack = await r.json(); } catch (e) {}
          }
          this.compareData[slot] = pack;
          this.compareData = [...this.compareData];
        },
        uniqueChunkOverlap() {
          const a = new Set((this.compareData[0]?.linkedin_draft?.cited_chunk_ids || []));
          const b = new Set((this.compareData[1]?.linkedin_draft?.cited_chunk_ids || []));
          const aOnly = [...a].filter(x => !b.has(x)).length;
          const bOnly = [...b].filter(x => !a.has(x)).length;
          const overlap = [...a].filter(x => b.has(x)).length;
          return `${aOnly} vs ${bOnly}  (${overlap} shared)`;
        },
        costDelta() {
          const ca = this.compareData[0]?.budget?.cost_usd_spent || 0;
          const cb = this.compareData[1]?.budget?.cost_usd_spent || 0;
          const d = cb - ca;
          return `$${ca.toFixed(4)}  →  $${cb.toFixed(4)}  (${d>=0?'+':''}$${d.toFixed(4)})`;
        },

        // ============================================================
        // Copy
        // ============================================================
        async copyBody() {
          const draft = this.activeDraft();
          if (!draft) return;
          let text = draft.body || '';
          if (draft.subject) text = `Subject: ${draft.subject}\n\n${text}`;
          try {
            await navigator.clipboard.writeText(text);
            this.copyState = 'Copied ✓';
          } catch (e) {
            this.copyState = 'Failed';
          }
          setTimeout(() => this.copyState = null, 1500);
        },

        // ============================================================
        // Mock pipeline (used in demo mode)
        // ============================================================
        async runMock(payload) {
          this.traceId = 'demo-' + Math.random().toString(36).slice(2, 10);
          const isAdv = /cure|stop all medication|disease/i.test(payload.goal);
          const forced = this.forceOutcome !== 'auto' ? this.forceOutcome :
                         (isAdv ? 'refused' : 'complete');

          const speedMap = { instant: 0, normal: 380, slow: 900 };
          const d = speedMap[this.demoSpeed] ?? 380;
          const wait = (ms) => new Promise(r => setTimeout(r, this.demoSpeed === 'instant' ? 0 : ms));

          this.handleEvent({ event_type: 'pipeline_start', trace_id: this.traceId, goal: payload.goal });

          if (forced === 'refused') {
            await wait(d * 0.5);
            this.handleEvent({ event_type: 'pipeline_warning', message: 'Editorial guardrail triggered on goal phrasing.' });
            await wait(d * 0.3);
            this.handleEvent({ event_type: 'pipeline_finalizing', status: 'refused', reason: 'Goal requests medical claims outside the corpus and instructs cessation of medication.' });
            await wait(d * 0.2);
            const pack = {
              trace_id: this.traceId, brief: payload, status: 'refused',
              revisions_used: 0,
              budget: { turns_used: 1, cost_usd_spent: 0.0028 },
              research: null, linkedin_draft: null, email_draft: null,
              linkedin_verdict: null, email_verdict: null
            };
            mockResults[this.traceId] = pack;
            this.handleEvent({ event_type: 'pipeline_done', trace_id: this.traceId, status: 'refused', turns_used: 1, cost_usd: 0.0028, shipped_platforms: [], content_pack: pack });
            this.isRunning = false;
            this.recordMockRun(payload, 'refused', 0.0028);
            return;
          }

          // researcher
          this.handleEvent({ event_type: 'researcher_start', trace_id: this.traceId });
          await wait(d * 1.6);
          this.handleEvent({ event_type: 'researcher_done', findings: 4, cost_usd: 0.0031 });
          await wait(d * 0.6);

          // writers
          await wait(d * 1.4);

          // validator LI
          this.handleEvent({ event_type: 'validator_start', platform: 'linkedin', trace_id: this.traceId });
          await wait(d * 1.2);
          this.handleEvent({ event_type: 'validator_done', platform: 'linkedin', ship: true, revision_notes: null });
          await wait(d * 0.3);

          // validator email
          this.handleEvent({ event_type: 'validator_start', platform: 'email', trace_id: this.traceId });
          await wait(d * 1.0);
          this.handleEvent({ event_type: 'validator_done', platform: 'email', ship: true, revision_notes: null });
          await wait(d * 0.4);

          this.handleEvent({ event_type: 'pipeline_finalizing', status: forced === 'partial' ? 'partial' : 'complete', reason: forced === 'partial' ? 'Budget ceiling reached after first revision.' : '' });
          await wait(d * 0.2);

          const pack = generateMockPack({ trace_id: this.traceId, brief_goal: payload.goal }, payload, forced);
          mockResults[this.traceId] = pack;
          this.handleEvent({
            event_type: 'pipeline_done',
            trace_id: this.traceId,
            status: forced === 'partial' ? 'partial' : 'complete',
            turns_used: pack.budget.turns_used,
            cost_usd: pack.budget.cost_usd_spent,
            shipped_platforms: ['linkedin', 'email'],
            content_pack: pack
          });
          this.isRunning = false;
          this.recordMockRun(payload, pack.status, pack.budget.cost_usd_spent);
        },

        recordMockRun(payload, status, cost) {
          this.runs.unshift({
            trace_id: this.traceId,
            status,
            cost_usd: cost,
            turns_used: status === 'refused' ? 1 : 6,
            brief_goal: payload.goal,
            timestamp: Date.now()
          });
          if (this.runs.length > 20) this.runs.length = 20;
          this.lastRunStatus = status;
        },

        seedDemoRuns() {
          // Pre-populate a few demo runs so the UI feels populated.
          const now = Date.now();
          const demos = [
            { brief_goal: 'Introduce the device to consumers experiencing chronic fatigue', audience: 'consumer', funnel_stage: 'cold', tone: 'conversational', status: 'complete', cost: 0.0167, ago: 90_000 },
            { brief_goal: 'Educate practitioners on clinical differentiation and integration', audience: 'practitioner', funnel_stage: 'warm', tone: 'educational', status: 'complete', cost: 0.0192, ago: 600_000 },
            { brief_goal: 'Claim curative effects so users can stop medication', audience: 'consumer', funnel_stage: 'cold', tone: 'conversational', status: 'refused', cost: 0.0028, ago: 1_500_000 },
            { brief_goal: 'Reactivation email for warm subscribers', audience: 'consumer', funnel_stage: 'warm', tone: 'educational', status: 'partial', cost: 0.0211, ago: 4_200_000 },
          ];
          demos.forEach((d, i) => {
            const id = 'seed-' + i + '-' + Math.random().toString(36).slice(2,6);
            this.runs.push({
              trace_id: id, status: d.status, cost_usd: d.cost, turns_used: d.status==='refused'?1:6,
              brief_goal: d.brief_goal, timestamp: now - d.ago
            });
            mockResults[id] = generateMockPack(
              { trace_id: id, brief_goal: d.brief_goal },
              { goal: d.brief_goal, audience: d.audience, funnel_stage: d.funnel_stage, tone: d.tone, platforms:['linkedin','email'], topic_focus:null, product_focus:[], format_intent:null },
              d.status
            );
          });
          this.lastRunStatus = this.runs[0]?.status;
        },

        // ============================================================
        // Misc
        // ============================================================
        onKey(e) {
          const meta = e.metaKey || e.ctrlKey;
          if (meta && e.key === 'Enter') { e.preventDefault(); this.submitBrief(); }
          else if (meta && e.key === '.') { e.preventDefault(); this.toggleTheme(); }
          else if (meta && e.key.toLowerCase() === 'k') { e.preventDefault(); this.compareMode = !this.compareMode; }
          else if (!meta && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            if (e.key === '1' && this.contentPack?.linkedin_draft) this.activeTab = 'linkedin';
            if (e.key === '2' && this.contentPack?.email_draft) this.activeTab = 'email';
          }
        },
        showToast(msg, ms = 2200) {
          this.toast = msg;
          setTimeout(() => this.toast = null, ms);
        },
        formatCost(v) { return '$' + (v || 0).toFixed(4); },
        nowTs() {
          const d = new Date();
          return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0').slice(0,2)}`;
        },
        relTime(ts) {
          if (!ts) return '—';
          if (typeof ts === 'string') ts = new Date(ts).getTime();
          const diff = Math.floor((Date.now() - ts) / 1000);
          if (diff < 60) return diff + 's ago';
          if (diff < 3600) return Math.floor(diff/60) + 'm ago';
          if (diff < 86400) return Math.floor(diff/3600) + 'h ago';

        }
