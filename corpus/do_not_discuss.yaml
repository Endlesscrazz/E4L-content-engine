# Mode-aware do_not_discuss flags.
#
# Enforced by the Validator via two independent passes:
#   1. Citation join: if a cited chunk has do_not_discuss=True, check mode
#   2. Draft-body scan: trigger_regex scan of generated text regardless of citations
#      (blocks parametric-knowledge evasion — model knows the content without citing it)
#
# mode: never_in_generated_content
#         Hard block. Never generate content on this topic.
#         Chunks with this mode are excluded from ALL retrieval results.
#
#       do_not_volunteer
#         Soft block. Only surface if the ContentBrief explicitly asks.
#         Chunks with this mode CAN be retrieved; Validator blocks if Writer
#         volunteers the info without a clear user request.
#
# chunk_content_patterns: strings used to flag matching chunks at ingest time.
#   Leave empty [] to rely only on draft-text scan (use when valid content
#   is mixed in the same chunk and flagging the whole chunk would suppress it).

do_not_discuss_flags:

  - flag: peter_fraser_death
    mode: never_in_generated_content
    description: >
      Peter Fraser's death. Explicit editorial directive in Origin Story source doc.
      Never generate content about this regardless of topic or audience.
    trigger_regex: "NOT to be discussed|Peter Fraser.{0,60}(died|death|passed|deceased)|passed away.{0,30}2012|he finally ran into health problems he was unable to resolve"
    annotation_source: human_reviewed
    chunk_content_patterns:
      - "NOT to be discussed"
      - "he finally ran into health problems he was unable to resolve"

  - flag: tws_legacy_product
    mode: do_not_volunteer
    description: >
      TWS / ProVision legacy product. Has not been sold since 2017.
      Only discuss if a practitioner or client directly asks about it.
    trigger_regex: "Total Wellness System|Total WellNES|\\bTWS\\b|\\bProVision\\b|has not been sold since 2017"
    annotation_source: human_reviewed
    chunk_content_patterns:
      - "Total Wellness System"
      - "has not been sold since 2017"

  - flag: skin_field_device
    mode: do_not_volunteer
    description: >
      Alternative skin-field scanning device. Only mention if directly asked
      about scanning alternatives (e.g. loud environments, babies, pets).
      The BWS chunk containing this instruction also has valid content,
      so we do NOT flag at chunk level — rely on draft-text scan only.
    trigger_regex: "device picking up on the field generated by the skin|only be discussed if someone asks"
    annotation_source: human_reviewed
    chunk_content_patterns: []
